specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NFTCollectionFactory
    network: sepolia
    source:
      address: "0xf17F507081ebe07F5E2Bb7BAaE36188B4751E6c3"
      abi: NFTCollectionFactory
      startBlock: 10647287
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Collection
        - MarketplaceStats
      abis:
        - name: NFTCollectionFactory
          file: ./abis/NFTCollectionFactory.json
      eventHandlers:
        - event: CollectionCreated(indexed address,indexed address,string,indexed uint256)
          handler: handleCollectionCreated
      file: ./src/factory.ts

  - kind: ethereum
    name: NFTMarketplace
    network: sepolia
    source:
      address: "0x32286F56e816ba139Cd52efdB6680aA0b0641C74"
      abi: NFTMarketplace
      startBlock: 10647296
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Listing
        - Offer
        - ActivityEvent
        - MarketplaceStats
        - CollectionStat
        - DailyCollectionSnapshot
        - FeeUpdate
        - AdminWithdrawal
        - RoyaltyPayment
        - PendingWithdrawalEvent
        - PendingBalance
      abis:
        - name: NFTMarketplace
          file: ./abis/NFTMarketplace.json
      eventHandlers:
        - event: ItemListed(indexed address,indexed uint256,indexed address,uint256)
          handler: handleItemListed
        - event: ListingPriceUpdated(indexed address,indexed uint256,indexed address,uint256,uint256)
          handler: handleListingPriceUpdated
        - event: ItemSold(indexed address,indexed uint256,address,address,uint256)
          handler: handleItemSold
        - event: ListingCancelled(indexed address,indexed uint256,indexed address)
          handler: handleListingCancelled
        - event: OfferMade(indexed address,indexed uint256,indexed address,uint256,uint256)
          handler: handleOfferMade
        - event: OfferAccepted(indexed address,indexed uint256,address,address,uint256)
          handler: handleOfferAccepted
        - event: OfferCancelled(indexed address,indexed uint256,indexed address)
          handler: handleOfferCancelled
        - event: OfferExpiredRefund(indexed address,indexed uint256,indexed address,uint256)
          handler: handleOfferExpiredRefund
        - event: MarketplaceFeeUpdated(uint256,uint256)
          handler: handleMarketplaceFeeUpdated
        - event: FeesWithdrawn(indexed address,uint256)
          handler: handleFeesWithdrawn
        - event: RoyaltyPaid(indexed address,uint256)
          handler: handleRoyaltyPaid
        - event: RoyaltyPending(indexed address,uint256)
          handler: handleRoyaltyPending
        - event: PendingWithdrawn(indexed address,uint256)
          handler: handlePendingWithdrawn
      file: ./src/marketplace.ts

templates:
  - kind: ethereum
    name: NFTCollection
    network: sepolia
    source:
      abi: NFTCollection
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NFT
        - Collection
        - ActivityEvent
        - MarketplaceStats
      abis:
        - name: NFTCollection
          file: ./abis/NFTCollection.json
      eventHandlers:
        - event: NFTMinted(indexed address,indexed uint256,string)
          handler: handleNFTMinted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: MintSeedCommitted(bytes32)
          handler: handleMintSeedCommitted
        - event: MintSeedRevealed(bytes32)
          handler: handleMintSeedRevealed
        - event: Revealed()
          handler: handleRevealed
        - event: Withdrawn(indexed address,uint256)
          handler: handleCollectionWithdrawn
      file: ./src/collection.ts
