type Collection @entity {
  id: ID!
  contractAddress: Bytes!
  creator: Bytes!
  name: String!
  symbol: String!
  description: String!
  image: String!
  maxSupply: BigInt!
  mintPrice: BigInt!
  totalSupply: BigInt!
  createdAt: BigInt!
  collectionId: BigInt!
  mintSeedCommitted: Boolean!
  mintSeedRevealed: Boolean!
  revealed: Boolean!
  # v2 trait schema support
  contractURI: String
  traitSchemaCID: String
  rarityFinalized: Boolean!
  traitDefinitions: [TraitDefinition!]! @derivedFrom(field: "collection")
  nfts: [NFT!]! @derivedFrom(field: "collection")
  stats: CollectionStat
  dailySnapshots: [DailyCollectionSnapshot!]! @derivedFrom(field: "collection")
}

type CollectionWithdrawal @entity(immutable: true) {
  id: ID!
  collection: Bytes!
  owner: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# ─── Per-collection trait schema (populated from contractURI IPFS JSON) ───────

type TraitDefinition @entity {
  id: ID!                           # "<collectionAddress>-<key>"
  collection: Collection!
  key: String!
  label: String!
  type: String!                     # "string"|"number"|"enum"|"boolean"|"date"
  required: Boolean!
  position: Int!
  minValue: BigDecimal
  maxValue: BigDecimal
  options: [TraitOption!]! @derivedFrom(field: "definition")
}

type TraitOption @entity {
  id: ID!                           # "<collectionAddress>-<key>-<valueSafe>"
  definition: TraitDefinition!
  collection: Collection!
  value: String!
  count: BigInt!
  frequency: BigDecimal!
}

# ─── Per-NFT resolved attributes (populated from tokenUri IPFS JSON) ──────────

type Attribute @entity {
  id: ID!                           # "<collectionAddress>-<tokenId>-<traitType>"
  nft: NFT!
  collection: Collection!
  traitType: String!
  valueStr: String
  valueNum: BigDecimal
  displayType: String
}

type NFT @entity {
  id: ID!
  tokenId: BigInt!
  tokenUri: String!
  owner: Bytes!
  collection: Collection!
  mintedAt: BigInt!
  listing: Listing
  offers: [Offer!]! @derivedFrom(field: "nft")
  # trait & rarity fields (populated after IPFS metadata is resolved)
  metadataResolved: Boolean!
  attributes: [Attribute!]! @derivedFrom(field: "nft")
  rarityScore: BigDecimal
  rarityRank: Int
  rarityTier: String
}

type Listing @entity {
  id: ID!
  nftContract: Bytes!
  tokenId: BigInt!
  seller: Bytes!
  price: BigInt!
  active: Boolean!
  nft: NFT
  collection: Collection
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Offer @entity {
  id: ID!
  nftContract: Bytes!
  tokenId: BigInt!
  buyer: Bytes!
  amount: BigInt!
  expiresAt: BigInt!
  active: Boolean!
  nft: NFT
  createdAt: BigInt!
  latestOfferId: String
}

enum ActivityType {
  listing
  listing_updated
  listing_cancelled
  sale
  offer
  offer_accepted
  offer_cancelled
  offer_expired_refund
  mint
  transfer
}

type ActivityEvent @entity {
  id: ID!
  type: ActivityType!
  nftContract: Bytes!
  tokenId: BigInt!
  from: Bytes!
  to: Bytes
  price: BigInt
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type MarketplaceStats @entity {
  id: ID!
  totalCollections: BigInt!
  totalNFTs: BigInt!
  totalListed: BigInt!
  totalVolume: BigInt!
  totalSales: BigInt!
}

# All-time aggregates only. Optional extension: volume24h / sales24h (bucketed in handlers)
# so the dApp can rank "Trending" without wide activityEvents scans.
type CollectionStat @entity {
  id: ID!
  collection: Collection!
  totalVolume: BigInt!
  totalSales: BigInt!
  floorPrice: BigInt
  floorPriceDayStart: BigInt
  volume24h: BigInt!
  sales24h: BigInt!
  lastUpdated: BigInt!
  activeListingCount: BigInt!
  rarityComputedAt: BigInt
}

type DailyCollectionSnapshot @entity {
  id: ID!
  collection: Collection!
  dayId: BigInt!
  date: BigInt!
  volume: BigInt!
  sales: BigInt!
  floor: BigInt
}

# ─── Admin / royalty audit trail ──────────────────────────────────────
# Immutable event logs for governance and payment auditing.  The entities
# below are indexed per-event (id = txHash-logIndex) so the dApp can
# reconstruct the full admin history without replaying contract logs.

type FeeUpdate @entity(immutable: true) {
  id: ID!
  oldFee: BigInt!
  newFee: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type AdminWithdrawal @entity(immutable: true) {
  id: ID!
  owner: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type RoyaltyPayment @entity(immutable: true) {
  id: ID!
  receiver: Bytes!
  amount: BigInt!
  # true = ETH pushed directly, false = credited to pull-payment ledger
  pushed: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type PendingWithdrawalEvent @entity(immutable: true) {
  id: ID!
  receiver: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Current balance in the marketplace pull-payment ledger, keyed by receiver.
# Updated on RoyaltyPending (credit) and PendingWithdrawn (debit).
type PendingBalance @entity {
  id: ID! # receiver address (hex)
  receiver: Bytes!
  balance: BigInt!
  lastUpdated: BigInt!
}
