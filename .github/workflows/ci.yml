name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart Contracts (Foundry) ──────────────────
  contracts:
    name: Foundry Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Run snapshot (gas report)
        run: forge snapshot

      - name: Coverage report
        run: forge coverage --report lcov --report summary

  # ─── Smart Contract Security (Slither) ─────────
  security-contracts:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: blockchain/
          fail-on: high
          slither-args: --filter-paths "test/|script/|lib/"

  # ─── Frontend (Next.js) ─────────────────────────
  frontend:
    name: Frontend Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps needed: connectkit@1.9.2 → @aave/account@0.2.0
        # has peerOptional wagmi@2.x, but project uses wagmi@3.x.
        # Remove once connectkit releases wagmi v3 support.
        run: npm ci --legacy-peer-deps

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_FACTORY_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000001"
          ALCHEMY_API_KEY: "test-key"
          PINATA_JWT: "test-jwt"
