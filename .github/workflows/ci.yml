name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart Contracts (Foundry) ──────────────────
  contracts:
    name: Foundry Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Run snapshot (gas report)
        run: forge snapshot

  # ─── Frontend (Next.js) ─────────────────────────
  frontend:
    name: Frontend Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_FACTORY_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000001"
          ALCHEMY_API_KEY: "test-key"
          PINATA_JWT: "test-jwt"
