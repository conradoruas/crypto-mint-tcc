services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time args (NEXT_PUBLIC_* are inlined into client JS)
        NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${NEXT_PUBLIC_MARKETPLACE_ADDRESS}
        NEXT_PUBLIC_FACTORY_CONTRACT_ADDRESS: ${NEXT_PUBLIC_FACTORY_CONTRACT_ADDRESS}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
        NEXT_PUBLIC_SUBGRAPH_URL: ${NEXT_PUBLIC_SUBGRAPH_URL:-}
        NEXT_PUBLIC_FAVORITES_ADDRESS: ${NEXT_PUBLIC_FAVORITES_ADDRESS:-}
    ports:
      - "3000:3000"
    environment:
      # Runtime secrets (server-only, never exposed to browser)
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - PINATA_JWT=${PINATA_JWT}
    restart: unless-stopped
